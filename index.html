<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monochrome Sidebar</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <nav class="navbar">
      <!-- Logo -->
      <div>
        <svg
          width="28"
          height="28"
          viewBox="0 0 24 24"
          fill="#e50914"
          aria-label="Netflix logo"
        >
          <path d="M5 3h4.1l5.8 12.5V3H19v18h-4.1L9.1 8.5V21H5V3z" />
        </svg>
      </div>

      <!-- Menu Icons -->
      <ul>
        <!-- Home -->
        <li class="icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#ffffff">
            <path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z" />
          </svg>
        </li>

        <!-- Search -->
        <li class="icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#ffffff">
            <path
              d="M10 2a8 8 0 105.3 14.1l4.3 4.3 1.4-1.4-4.3-4.3A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"
            />
          </svg>
        </li>

        <!-- Movies -->
        <li class="icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#ffffff">
            <path d="M4 4h16v16H4V4zm2 2v12h12V6H6z" />
          </svg>
        </li>

        <!-- TV -->
        <li class="icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#ffffff">
            <path d="M4 6h16v12H4V6zm2 2v8h12V8H6z" />
          </svg>
        </li>

        <!-- Downloads -->
        <li class="icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#ffffff">
            <path d="M12 3v10l3-3h-2V3h-2v7H9l3 3V3zM5 19h14v2H5v-2z" />
          </svg>
        </li>

        <!-- Profile -->
        <li class="icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#ffffff">
            <path
              d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-4.4 0-8 2-8 4.5V21h16v-2.5C20 16 16.4 14 12 14z"
            />
          </svg>
        </li>
      </ul>
    </nav>

    <main>
      <section class="featured">
        <img class="img" src="images/money-heist.jpg" alt="Featured Image" />
        <div class="featured-content">
          <h1>Money Heist</h1>
          <p>A thrilling sci-fi adventure</p>
          <div class="featured-actions">
            <button class="press">Play</button>
            <button class="press1">Watch Trailer</button>
          </div>
        </div>
      </section>

      <div class="movies">
        <section class="content">
          <h2>New This Week</h2>
          <div class="cards">
            <div class="card">
              <img src="images/help.jpg" alt="HELP poster" />
              <p>HELP</p>
            </div>
            <div class="card">
              <img src="images/the-platform.jpg" alt="The Platform poster" />
              <p>The Platform</p>
            </div>
            <div class="card">
              <img src="images/the-novice.jpg" alt="The Novice poster" />
              <p>The Novice</p>
            </div>
            <div class="card">
              <img src="images/fair play.jpg" alt="Fair Play poster" />
              <p>Fair Play</p>
            </div>
            <div class="card">
              <img src="images/the-novice.jpg" alt="The Novice poster" />
              <p>The Novice</p>
            </div>
            <div class="card">
              <img src="images/fair play.jpg" alt="Fair Play poster" />
              <p>Fair Play</p>
            </div>
          </div>
        </section>

        <section class="content">
          <h2>Trending this week</h2>
          <div class="cards">
            <div class="card">
              <img src="images/help.jpg" alt="HELP poster" />
              <p>HELP</p>
            </div>
            <div class="card">
              <img src="images/the-platform.jpg" alt="The Platform poster" />
              <p>The Platform</p>
            </div>
            <div class="card">
              <img src="images/the-novice.jpg" alt="The Novice poster" />
              <p>The Novice</p>
            </div>
            <div class="card">
              <img src="images/fair play.jpg" alt="Fair Play poster" />
              <p>Fair Play</p>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
